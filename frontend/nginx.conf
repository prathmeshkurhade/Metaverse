# Nginx config for serving the React frontend inside a Docker container.
#
# WHY Nginx?
# After "npm run build", React outputs plain HTML/CSS/JS files. You need a
# web server to serve them. Nginx is the industry standard -- tiny (5MB),
# fast, handles thousands of connections with minimal RAM.
#
# WHAT THIS DOES:
# 1. Serves the React static files (index.html, JS bundles, CSS)
# 2. Routes /api/v1/ai/* requests to the AI Assistant container (port 8002)
# 3. Routes /api/* requests to the HTTP API container (port 8000)
# 4. Routes /ws requests to the WebSocket container (port 8001)
# 5. For any unknown path, serves index.html (so React Router handles it)

server {
    # Listen on port 80 inside the container
    listen 80;

    # Where the static files live (built by "npm run build")
    root /usr/share/nginx/html;
    index index.html;

    # ── AI Assistant API (must come BEFORE /api to match first) ──
    # WHY before /api? Nginx matches locations by prefix. /api/v1/ai/chat
    # would match both /api and /api/v1/ai. The LONGER prefix wins, but
    # putting it first makes the intent clear.
    location /api/v1/ai/ {
        # proxy_pass: "forward this request to the AI container"
        # In Docker Compose, "ai-assistant" is the container's hostname
        # (Docker DNS resolves container names automatically)
        proxy_pass http://ai-assistant:8002;

        # These headers tell the backend the REAL client info, not Nginx's
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── HTTP API ──
    location /api/ {
        proxy_pass http://http-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket Server ──
    location /ws {
        proxy_pass http://ws-server:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # These 3 headers are REQUIRED for WebSocket to work through a proxy.
        # Without them, Nginx treats it as a regular HTTP request and breaks
        # the persistent connection.
        # HTTP/1.1 supports the Upgrade mechanism. HTTP/1.0 does not.
        proxy_http_version 1.1;
        # "Upgrade: websocket" tells Nginx "this connection is switching protocols"
        proxy_set_header Upgrade $http_upgrade;
        # "Connection: Upgrade" confirms the protocol switch
        proxy_set_header Connection "upgrade";

        # Keep WebSocket alive for 24 hours. Default is 60 seconds -- after
        # which Nginx would kill idle connections. Users sitting in a room
        # without moving would get disconnected.
        proxy_read_timeout 86400;
    }

    # ── Frontend (React Router) ──
    # For any path that doesn't match /api or /ws, serve index.html.
    # WHY try_files? React Router uses client-side routing. If a user
    # navigates to /arena/abc123 and refreshes, the browser asks Nginx for
    # /arena/abc123 (which doesn't exist as a file). try_files says:
    # "try the exact path first, then the path as a directory, then
    # fall back to index.html" -- which loads React, which handles the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
