# ══════════════════════════════════════════════════════════
# Server 1: HTTP (port 80) → redirect to HTTPS
# ══════════════════════════════════════════════════════════
# WHY redirect? We want ALL traffic encrypted. If someone types
# http://funmetaverse.duckdns.org, we send them to https:// automatically.
# "301" = permanent redirect. Browsers remember it and go straight to HTTPS next time.
server {
    listen 80;
    server_name funmetaverse.duckdns.org;
    return 301 https://$host$request_uri;
}

# ══════════════════════════════════════════════════════════
# Server 2: HTTPS (port 443) → the real server
# ══════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name funmetaverse.duckdns.org;

    # ── SSL certificate files (from Let's Encrypt / Certbot) ──
    # These are the files certbot created. They're mounted into the
    # container via docker-compose volumes.
    # fullchain.pem = certificate + public key (sent to browsers)
    # privkey.pem = private key (never leaves the server)
    ssl_certificate     /etc/letsencrypt/live/funmetaverse.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/funmetaverse.duckdns.org/privkey.pem;

    # Where the static files live (built by "npm run build")
    root /usr/share/nginx/html;
    index index.html;

    # ── AI Assistant API ──
    location /api/v1/ai/ {
        proxy_pass http://ai-assistant:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── HTTP API ──
    location /api/ {
        proxy_pass http://http-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket Server ──
    location /ws {
        proxy_pass http://ws-server:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Frontend (React Router) ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
