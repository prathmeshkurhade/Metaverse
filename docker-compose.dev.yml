# Local dev overrides -- no SSL, no certificate volumes
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  frontend:
    ports:
      - "80:80"
    volumes:
      # Override the production nginx.conf with the dev one (no SSL)
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf
